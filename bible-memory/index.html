<script>
(function(){
"use strict";
const D = window.BIBLE_DATA;
const V = D.verses, COLLS = D.collections;
const $ = s => document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc = s => s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));

// ---- state / storage ----
const LS = {
  get l(){try{return new Set(JSON.parse(localStorage.bm_learned||'[]'))}catch(e){return new Set()}},
  set l(s){localStorage.bm_learned=JSON.stringify([...s])},
  get coll(){return localStorage.bm_coll||COLLS[0].name},
  set coll(v){localStorage.bm_coll=v},
  get tests(){try{return JSON.parse(localStorage.bm_tests||'[]')}catch(e){return []}},
  set tests(v){localStorage.bm_tests=JSON.stringify(v.slice(-60))}
};
let learned = LS.l;
let curColl = COLLS.find(c=>c.name===LS.coll) ? LS.coll : COLLS[0].name;
let tab = 'memorize';
const state = { openGroups:new Set(), openNodes:new Set(), lastBrowseColl:null, mzScope:null, mzList:[], mzIdx:0, mzHint:0, unlearnedOnly:localStorage.bm_unlearned==='1' };
function unlearnedToggle(){
  const b=el('button','tool-btn ut'+(state.unlearnedOnly?' on':''),(state.unlearnedOnly?'☑':'☐')+' 안 외운 것만');
  b.onclick=()=>{ state.unlearnedOnly=!state.unlearnedOnly; localStorage.bm_unlearned=state.unlearnedOnly?'1':''; state.lastBrowseColl=null; state.mzList=[]; render(); };
  return b;
}

let curVersion = localStorage.bm_version || D.defaultVersion || (D.versions&&D.versions[0]&&D.versions[0].id) || 'krv';
let curParallel = localStorage.bm_parallel || '';   // 대역(없으면 '')
const T = v => (v.texts && (v.texts[curVersion]||v.texts[D.defaultVersion]||Object.values(v.texts)[0])) || v.text || '';
const T2 = v => (curParallel && curParallel!==curVersion && v.texts && v.texts[curParallel]) ? v.texts[curParallel] : '';
const verName = id => { const x=(D.versions||[]).find(vv=>vv.id===id); return x?x.name:id; };
const collVerses = () => V.filter(v=>v.coll===curColl);
const learnedCount = coll => collVerses().filter(v=>learned.has(v.id)).length;

// group a collection's verses into { catName: { subName|'' : [verses] } } preserving order
function buildTree(verses){
  const tree=new Map();
  for(const v of verses){
    const cat = v.sub[0]||'전체';
    const sub = v.sub.length>1 ? v.sub.slice(1).join(' · ') : '';
    if(!tree.has(cat)) tree.set(cat,new Map());
    const m=tree.get(cat);
    if(!m.has(sub)) m.set(sub,[]);
    m.get(sub).push(v);
  }
  return tree;
}

// ================= VIEWS =================
function render(){
  $('#collLabel').textContent = (COLLS.find(c=>c.name===curColl)||{}).short || curColl;
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  const v=$('#view'); v.innerHTML='';
  if(tab==='browse') renderBrowse(v);
  else if(tab==='memorize') renderMemorize(v);
  else if(tab==='test') renderTest(v);
  else renderProgress(v);
  window.scrollTo(0,0);
}

// ---------- BROWSE (nested accordion) ----------
const CARET='<svg class="caret" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg>';
function buildNTree(verses){
  const root={children:new Map(),verses:[],path:'',pathArr:[]};
  for(const v of verses){
    let node=root;
    const subs=(v.sub&&v.sub.length)?v.sub:['전체'];
    for(const name of subs){
      if(!node.children.has(name)) node.children.set(name,{name,children:new Map(),verses:[],path:node.path+''+name,pathArr:node.pathArr.concat(name)});
      node=node.children.get(name);
    }
    node.verses.push(v);
  }
  return root;
}
function nodeStats(node){
  let t=node.verses.length, d=node.verses.filter(v=>learned.has(v.id)).length;
  node.children.forEach(c=>{const s=nodeStats(c);t+=s.t;d+=s.d;});
  return {t,d};
}
function headingPaths(node,acc){
  node.children.forEach(c=>{ if(c.children.size>0){acc.push(c.path);headingPaths(c,acc);} });
  return acc;
}
function scopeMatch(v,scope){ return (scope==='__all'||!scope)?true:(Array.isArray(scope)?scope.every((s,i)=>v.sub[i]===s):(v.sub[0]||'전체')===scope); }
function scopeLabel(scope){ return (scope==='__all'||!scope)?'전체':(Array.isArray(scope)?scope.join(' › '):scope); }
function vTitle(v){ return (v.sub&&v.sub.length)?v.sub[v.sub.length-1]:v.ref; }
function renderBrowse(root){
  const verses=collVerses();
  const done=verses.filter(v=>learned.has(v.id)).length;
  const pct=Math.round(done/verses.length*100);
  root.appendChild(el('div','progress-band',
    `<div class="pb-top"><b>${esc((COLLS.find(c=>c.name===curColl)||{}).short||'')}</b>`+
    `<span class="pct">${pct}%</span></div>`+
    `<div class="bar"><i style="width:${pct}%"></i></div>`+
    `<div class="pinfo">${done} / ${verses.length} 구절 외움</div>`));

  root.appendChild(el('div','filter-row')).appendChild(unlearnedToggle());

  const shown = state.unlearnedOnly ? verses.filter(v=>!learned.has(v.id)) : verses;
  if(!shown.length){ root.appendChild(el('div','empty','이 과정을 모두 외웠어요 🎉')); return; }
  const tree=buildNTree(shown);
  // default 대분류만: reset to all-closed when collection changes
  if(state.lastBrowseColl!==curColl){ state.openNodes=new Set(); state.lastBrowseColl=curColl; }

  const tools=el('div','browse-tools');
  const tOutline=el('button','tool-btn','⊞ 주제까지 펼치기');
  tOutline.onclick=()=>{ state.openNodes=new Set(headingPaths(tree,[])); render(); };
  const tCollapse=el('button','tool-btn','⊟ 모두 접기');
  tCollapse.onclick=()=>{ state.openNodes=new Set(); render(); };
  tools.append(tOutline,tCollapse);
  root.appendChild(tools);

  tree.children.forEach(node=>renderNode(node,root,0));
}
function renderNode(node,parent,depth){
  const isOpen=state.openNodes.has(node.path);
  const {t,d}=nodeStats(node);
  const head=el('button','acc-head d'+depth+(isOpen?' open':''),
    CARET+`<span class="at">${esc(node.name)}</span><span class="ac">${d}/${t}</span><span class="acc-go" title="이 범위 암송·시험">▶</span>`);
  head.style.paddingLeft=(15+depth*16)+'px';
  head.onclick=()=>{ isOpen?state.openNodes.delete(node.path):state.openNodes.add(node.path); render(); };
  head.querySelector('.acc-go').onclick=e=>{ e.stopPropagation(); openScopeActions(node); };
  if(depth===0){
    const g=el('div','group');
    g.appendChild(head);
    if(isOpen){ const body=el('div','g-body'); fillNode(node,body,depth); g.appendChild(body); }
    parent.appendChild(g);
  }else{
    parent.appendChild(head);
    if(isOpen) fillNode(node,parent,depth);
  }
}
function fillNode(node,parent,depth){
  node.children.forEach(c=>renderNode(c,parent,depth+1));
  node.verses.forEach(v=>{
    const row=el('button','vrow'+(learned.has(v.id)?' done':''),
      `<span class="vref">${esc(v.ref)}</span>`+
      `<span class="vsnip">${esc(T(v).slice(0,40))}</span>`+
      `<span class="vchk">✓</span>`);
    row.style.paddingLeft=(16+(depth+1)*16)+'px';
    row.onclick=()=>openVerse(v);
    parent.appendChild(row);
  });
}

// ---------- verse sheet ----------

  const s=$('#sheet');
  const isL=learned.has(v.id);
  s.innerHTML=`<div class="grip"></div>`+
    `<div class="sref">${esc(v.ref)}</div>`+
    `<div class="spath">${esc([v.coll.replace(/^\S+구절\s*/,''),...v.sub].filter(Boolean).join(' › '))}</div>`+

    (T2(v)?`<div class="stext2">${esc(T2(v))}</div>`:'')+

      `<button class="btn ${isL?'primary':''}" id="shL">${isL?'✓ 외움':'외웠어요'}</button>`+

function closeSheet(){$('#sheetBack').classList.remove('show');}
$('#sheetBack').addEventListener('click',e=>{if(e.target===$('#sheetBack'))closeSheet();});

function openScopeActions(node){
  const {t,d}=nodeStats(node);
  const s=$('#sheet');
  s.innerHTML=`<div class="grip"></div>`+
    `<div class="sref" style="font-size:17px">${esc(node.name)}</div>`+
    `<div class="spath">${esc(node.pathArr.join(' › '))} · ${t}구절 · ${d} 외움</div>`+
    `<div class="sactions" style="flex-direction:column">`+
      `<button class="btn primary" id="scMz">🎯 이 범위 암송하기</button>`+
      `<button class="btn" id="scTt">✅ 이 범위 시험하기</button>`+
      `<button class="btn ghost" id="scC">닫기</button>`+
    `</div>`;
  $('#scMz').onclick=()=>{ state.mzScope=node.pathArr; state.mzList=[]; tab='memorize'; closeSheet(); render(); };
  $('#scTt').onclick=()=>{ TState.scope=node.pathArr; TState.mode=null; tab='test'; closeSheet(); render(); };
  $('#scC').onclick=closeSheet;
  $('#sheetBack').classList.add('show');
}

function toggleLearn(id){
  learned.has(id)?learned.delete(id):learned.add(id);
  LS.l=learned;
}
function renderIfVisible(){ if(tab==='browse'||tab==='progress') render(); }

// ---------- MEMORIZE ----------
function renderMemorize(root){
  const verses=collVerses();
  // scope chips: 전체 + categories
  const cats=[...buildTree(verses).keys()];
  if(!state.mzScope) state.mzScope='__all';

  // resume banner: shown when saved position differs from current view
  const rz=getResume();
  const sameView = rz && rz.coll===curColl && JSON.stringify(rz.scope)===JSON.stringify(state.mzScope) && rz.idx===state.mzIdx;
  if(rz && rz.ids && rz.ids.length && !sameView){
    const cs=(COLLS.find(c=>c.name===rz.coll)||{}).short||rz.coll;
    const sl=scopeLabel(rz.scope);
    const banner=el('button','resume-banner',
      `<span class="rb-ic">↩</span><div class="rb-tx"><b>이어서 암송하기</b>`+
      `<span>${esc(cs)} · ${esc(sl)} · ${(rz.idx+1)}/${rz.ids.length}</span></div><span class="rb-go">▶</span>`);
    banner.onclick=()=>applyResume(rz);
    root.appendChild(banner);
  }

  const scopeArr=Array.isArray(state.mzScope)?state.mzScope:null;
  // breadcrumb for a deep (browse-selected) scope
  if(scopeArr && scopeArr.length>1){
    const bc=el('div','scope-crumb',`<span>🎯 ${esc(scopeLabel(scopeArr))}</span><button class="crumb-x">✕</button>`);
    bc.querySelector('.crumb-x').onclick=()=>{state.mzScope='__all';startMz();};
    root.appendChild(bc);
  }
  const row=el('div','pill-row');
  const allChip=el('button','chip'+(state.mzScope==='__all'?' on':''),'전체 '+verses.length);
  allChip.onclick=()=>{state.mzScope='__all';startMz();};
  row.appendChild(allChip);
  cats.forEach(c=>{
    const n=verses.filter(v=>(v.sub[0]||'전체')===c).length;
    const ch=el('button','chip'+((scopeArr&&scopeArr[0]===c)?' on':''),esc(c)+' '+n);
    ch.onclick=()=>{state.mzScope=[c];startMz();};
    row.appendChild(ch);
  });
  root.appendChild(row);
  root.appendChild(el('div','filter-row')).appendChild(unlearnedToggle());

  buildMzList();
  if(!state.mzList.length){root.appendChild(el('div','empty',state.unlearnedOnly?'이 범위는 다 외웠어요 🎉':'구절이 없습니다.'));return;}
  if(state.mzIdx>=state.mzList.length) state.mzIdx=0;
  const v=state.mzList[state.mzIdx];

  // 가릴 것(맞추기 대상) 선택 → 나머지는 보임, 카드 탭하면 정답 확인
  if(!state.mzMode) state.mzMode='verse';
  const modes=[['all','전체'],['verse','구절'],['title','제목'],['ref','참조'],['first','첫글자'],['blank','빈칸']];
  root.appendChild(el('div','mode-cap','가리고 맞추기'));
  const hb=el('div','hintbar');
  modes.forEach(([k,label])=>{const b=el('button','hint'+(state.mzMode===k?' on':''),label);b.onclick=()=>{state.mzMode=k;state.mzReveal=false;saveResume();render();};hb.appendChild(b);});
  root.appendChild(hb);

  const m=state.mzMode, rev=!!state.mzReveal;
  const showRef=rev||m!=='ref';
  const showTitle=rev||m!=='title';
  const showVerseFull=rev||!(m==='verse'||m==='first'||m==='blank');
  const title=[...v.sub].filter(Boolean).join(' › ')||v.coll;
  let verseHtml;
  if(showVerseFull) verseHtml=esc(T(v));
  else if(m==='first') verseHtml=renderHintText(T(v),1);
  else if(m==='blank') verseHtml=renderHintText(T(v),2);
  else verseHtml='<span class="fl">✧ 구절을 떠올려 보세요 ✧</span>';
  const par=(showVerseFull&&T2(v))?`<div class="ftext2">${esc(T2(v))}</div>`:'';
  const card=el('div','flash');
  card.style.touchAction='pan-y';
  card.innerHTML=`<div class="fref${showRef?'':' hide'}">${showRef?esc(v.ref):'참조 ?'}</div>`+
    `<div class="fpath${showTitle?'':' hide'}">${showTitle?esc(title):'제목 ?'}</div>`+
    `<div class="ftext"><div class="ftmain">${verseHtml}</div>${par}</div>`;
  let _sx=0,_sy=0,_st=0;
  card.addEventListener('pointerdown',e=>{_sx=e.clientX;_sy=e.clientY;_st=Date.now();});
  card.addEventListener('pointerup',e=>{
    const dx=e.clientX-_sx, dy=e.clientY-_sy;
    if(Math.abs(dx)>45 && Math.abs(dx)>Math.abs(dy)*1.4){ mzGo(dx<0?1:-1); }
    else if(Math.abs(dx)<12 && Math.abs(dy)<12 && Date.now()-_st<400){ mzReveal(); }
  });
  root.appendChild(card);

  const nav=el('div','mz-nav');
  const prev=el('button','iconbtn','‹');prev.onclick=()=>mzGo(-1);
  const next=el('button','iconbtn','›');next.onclick=()=>mzGo(1);
  const cnt=el('div','cnt',(state.mzIdx+1)+' / '+state.mzList.length);
  const isL=learned.has(v.id);
  const lb=el('button','learnbtn'+(isL?' on':''),isL?'✓ 외움':'외웠어요');
  lb.onclick=()=>{toggleLearn(v.id);saveResume();render();};
  nav.append(prev,cnt,next);
  root.appendChild(nav);
  const nav2=el('div','mz-nav');nav2.appendChild(lb);
  const sh=el('button','iconbtn','🔀');sh.onclick=()=>{shuffle(state.mzList);state.mzIdx=0;state.mzReveal=false;saveResume();render();};
  nav2.appendChild(sh);
  root.appendChild(nav2);
  root.appendChild(el('div','pinfo','카드 탭 = 정답 확인 · 스와이프 = 다음 구절'));
}
function mzScopeList(){
  const verses=collVerses();
  let list = verses.filter(v=>scopeMatch(v,state.mzScope));
  if(state.unlearnedOnly) list=list.filter(v=>!learned.has(v.id));
  return list;
}
function getResume(){ try{return JSON.parse(localStorage.bm_resume||'null')}catch(e){return null} }
function saveResume(){ if(!state.mzList||!state.mzList.length)return; try{localStorage.bm_resume=JSON.stringify({coll:curColl,scope:state.mzScope,idx:state.mzIdx,mode:state.mzMode,ids:state.mzList.map(v=>v.id)});}catch(e){} }
function applyResume(r){
  curColl=r.coll; LS.coll=r.coll; state.mzScope=r.scope;
  const list=mzScopeList();
  const byId=new Map(list.map(v=>[v.id,v]));
  const ordered=(r.ids||[]).map(id=>byId.get(id)).filter(Boolean);
  state.mzList = ordered.length===list.length ? ordered : list.slice();
  state.mzIdx = Math.min(r.idx||0, Math.max(0,state.mzList.length-1));
  state.mzMode = r.mode||'all'; state.mzReveal=false;
  tab='memorize'; render();
}
function buildMzList(){
  const list = mzScopeList();
  // keep existing shuffled order if same length & scope unchanged
  if(!state.mzList.length||state.mzList.some(v=>!list.includes(v))||state.mzList.length!==list.length){
    state.mzList=list.slice(); state.mzIdx=0;
  }
}
function startMz(){state.mzList=[];state.mzIdx=0;state.mzReveal=false;render();}
function mzGo(d){ if(!state.mzList.length)return; state.mzIdx=(state.mzIdx+d+state.mzList.length)%state.mzList.length; state.mzReveal=false; saveResume(); render(); }
function mzReveal(){ state.mzReveal=!state.mzReveal; render(); }
function renderHintText(text,mode){
  if(mode===0) return esc(text);
  if(mode===3) return '<span class="fl">✧ 참조를 보고 암송해 보세요 ✧</span>';
  const words=text.split(' ');
  if(mode===1){ // first letter
    return words.map(w=>{const c=[...w];return esc(c[0]||'')+'<span class="fl">'+'·'.repeat(Math.max(c.length-1,0))+'</span>';}).join(' ');
  }
  // blanks: hide ~40%
  return words.map((w,i)=>{return ((i*7+3)%5<2)?'<span class="blank">'+esc(w)+'</span>':esc(w);}).join(' ');
}

// ---------- TEST ----------
const TState={mode:null,scope:'__all',list:[],idx:0,score:0,answered:false};
function renderTest(root){
  if(!TState.mode){ renderTestMenu(root); return; }
  renderQuiz(root);
}
function renderTestMenu(root){
  const verses=collVerses();
  const cats=[...buildTree(verses).keys()];
  // scope selector
  root.appendChild(el('div','section-title','시험 범위'));
  const scopeArr=Array.isArray(TState.scope)?TState.scope:null;
  if(scopeArr && scopeArr.length>1){
    const bc=el('div','scope-crumb',`<span>🎯 ${esc(scopeLabel(scopeArr))}</span><button class="crumb-x">✕</button>`);
    bc.querySelector('.crumb-x').onclick=()=>{TState.scope='__all';render();};
    root.appendChild(bc);
  }
  const row=el('div','pill-row');
  const allC=el('button','chip'+(TState.scope==='__all'?' on':''),'전체 '+verses.length);
  allC.onclick=()=>{TState.scope='__all';render();};
  row.appendChild(allC);
  cats.forEach(c=>{
    const ch=el('button','chip'+((scopeArr&&scopeArr[0]===c)?' on':''),esc(c));
    ch.onclick=()=>{TState.scope=[c];render();};
    row.appendChild(ch);
  });
  root.appendChild(row);

  root.appendChild(el('div','section-title','유형 선택'));
  const modes=[
    ['ref2text','📝','참조 → 구절','장절을 보고 구절을 암송, 스스로 채점'],
    ['text2ref','🔍','구절 → 참조','구절을 보고 어디 말씀인지 4지선다'],
    ['blank','✏️','빈칸 채우기','가려진 구절을 떠올린 뒤 확인'],
    ['title2text','📌','제목 → 구절','제목을 보고 장절·구절 떠올리기'],
    ['text2title','🏷️','구절 → 제목','구절을 보고 제목 떠올리기']
  ];
  const grid=el('div','mode-grid');
  modes.forEach(([k,ic,t,d])=>{
    const c=el('button','mode-card',`<div class="mi">${ic}</div><div><div class="mt">${t}</div><div class="md">${d}</div></div>`);
    c.onclick=()=>startTest(k);
    grid.appendChild(c);
  });
  root.appendChild(grid);

  const hist=LS.tests.filter(t=>t.coll===curColl).slice(-5).reverse();
  if(hist.length){
    root.appendChild(el('div','section-title','최근 기록'));
    hist.forEach(h=>{
      root.appendChild(el('div','group',
        `<div style="padding:13px 16px;display:flex;justify-content:space-between;align-items:center">`+
        `<span style="font-weight:700;font-size:14px">${({ref2text:'참조→구절',text2ref:'구절→참조',blank:'빈칸',title2text:'제목→구절',text2title:'구절→제목'})[h.mode]} · ${esc(h.scope)}</span>`+
        `<span style="font-weight:800;color:var(--brand)">${h.score}/${h.total}</span></div>`));
    });
  }
}
function startTest(mode){
  const verses=collVerses();
  let list=verses.filter(v=>scopeMatch(v,TState.scope));
  shuffle(list);
  list=list.slice(0,Math.min(10,list.length));
  Object.assign(TState,{mode,list,idx:0,score:0,answered:false});
  render();
}
function endTest(){
  const t=LS.tests;t.push({coll:curColl,mode:TState.mode,scope:scopeLabel(TState.scope),score:TState.score,total:TState.list.length,at:Date.now()});LS.tests=t;
}
function renderQuiz(root){
  const {list,idx,mode}=TState;
  if(idx>=list.length){ // result
    const pct=Math.round(TState.score/list.length*100);
    const box=el('div','result',
      `<div class="big">${TState.score}/${list.length}</div>`+
      `<div class="rl">${pct}점 · ${pct>=80?'훌륭해요! 🎉':pct>=50?'좋아요, 조금 더! 💪':'다시 도전해봐요 🙏'}</div>`);
    const b1=el('button','btn primary','다시 풀기');b1.style.maxWidth='240px';b1.style.margin='0 auto 10px';b1.onclick=()=>startTest(mode);
    const b2=el('button','btn ghost','유형 선택으로');b2.style.maxWidth='240px';b2.style.margin='0 auto';b2.onclick=()=>{TState.mode=null;render();};
    box.append(b1,b2);root.appendChild(box);return;
  }
  const v=list[idx];
  const head=el('div','quiz-head',`<span class="qx">${idx+1} / ${list.length}</span><span class="score">점수 ${TState.score}</span>`);
  root.appendChild(head);
  root.appendChild(el('div','qbar',`<i style="width:${idx/list.length*100}%"></i>`));

  if(mode==='text2ref') return quizText2Ref(root,v);
  if(mode==='blank') return quizBlank(root,v);
  if(mode==='title2text') return quizTitle2Text(root,v);
  if(mode==='text2title') return quizText2Title(root,v);
  return quizRef2Text(root,v);
}
function selfGrade(root){
  const wrap=el('div');wrap.innerHTML='<div class="section-title" style="text-align:center">얼마나 맞혔나요?</div>';
  const sr=el('div','selfrow');
  const ok=el('button','btn primary','✓ 맞음');ok.onclick=()=>nextQ(true);
  const no=el('button','btn','✗ 틀림');no.onclick=()=>nextQ(false);
  sr.append(no,ok);wrap.appendChild(sr);root.appendChild(wrap);
}
function quizTitle2Text(root,v){
  root.appendChild(el('div','qcard',`<div class="qprompt">이 제목의 장절·구절을 떠올리세요</div><div class="qref">${esc(vTitle(v))}</div>`));
  if(!TState.answered){ const b=el('button','btn primary','정답 보기');b.onclick=()=>{TState.answered=true;render();};root.appendChild(b); }
  else{ root.appendChild(el('div','reveal-box',`<b style="color:var(--brand)">${esc(v.ref)}</b><br>${esc(T(v))}`)); selfGrade(root); }
}
function quizText2Title(root,v){
  root.appendChild(el('div','qcard',`<div class="qprompt">이 구절의 제목은?</div><div class="qtext">${esc(T(v))}</div>`));
  if(!TState.answered){ const b=el('button','btn primary','제목 확인');b.onclick=()=>{TState.answered=true;render();};root.appendChild(b); }
  else{ root.appendChild(el('div','reveal-box',`<b style="color:var(--accent)">${esc(vTitle(v))}</b><br><span class="mini">${esc(v.ref)}</span>`)); selfGrade(root); }
}
function nextQ(correct){ if(correct)TState.score++; TState.idx++; TState.answered=false;
  if(TState.idx>=TState.list.length) endTest(); render(); }

function quizRef2Text(root,v){
  const card=el('div','qcard',`<div class="qprompt">이 장절의 구절을 암송하세요</div><div class="qref">${esc(v.ref)}</div>`);
  root.appendChild(card);
  if(!TState.answered){
    const b=el('button','btn primary','정답 보기');b.onclick=()=>{TState.answered=true;render();};
    root.appendChild(b);
  }else{
    root.appendChild(el('div','reveal-box',esc(T(v))));
    const wrap=el('div');wrap.innerHTML='<div class="section-title" style="text-align:center">얼마나 맞혔나요?</div>';
    const sr=el('div','selfrow');
    const ok=el('button','btn primary','✓ 맞음');ok.onclick=()=>nextQ(true);
    const no=el('button','btn','✗ 틀림');no.onclick=()=>nextQ(false);
    sr.append(no,ok);wrap.appendChild(sr);root.appendChild(wrap);
  }
}
function quizText2Ref(root,v){
  const card=el('div','qcard',`<div class="qprompt">이 구절은 어디 말씀일까요?</div><div class="qtext">${esc(T(v))}</div>`);
  root.appendChild(card);
  if(!TState._opts||TState._optsFor!==v.id){
    const pool=collVerses().filter(x=>x.id!==v.id);shuffle(pool);
    const opts=[v,...pool.slice(0,3)];shuffle(opts);
    TState._opts=opts;TState._optsFor=v.id;
  }
  const letters='ABCD';
  TState._opts.forEach((o,i)=>{
    const b=el('button','opt',`<span class="ol">${letters[i]}</span><span>${esc(o.ref)}</span>`);
    if(TState.answered){
      if(o.id===v.id)b.classList.add('correct');
      else if(TState._pick===o.id)b.classList.add('wrong');
      b.disabled=true;
    }else{
      b.onclick=()=>{TState.answered=true;TState._pick=o.id;setTimeout(()=>nextQ(o.id===v.id),750);render();};
    }
    root.appendChild(b);
  });
}
function quizBlank(root,v){
  const card=el('div','qcard');
  card.innerHTML=`<div class="qprompt">${esc(v.ref)}</div>`+
    `<div class="qtext">${TState.answered?esc(T(v)):blankOut(T(v))}</div>`;
  root.appendChild(card);
  if(!TState.answered){
    const b=el('button','btn primary','정답 확인');b.onclick=()=>{TState.answered=true;render();};root.appendChild(b);
  }else{
    const sr=el('div','selfrow');
    const ok=el('button','btn primary','✓ 맞음');ok.onclick=()=>nextQ(true);
    const no=el('button','btn','✗ 틀림');no.onclick=()=>nextQ(false);
    sr.append(no,ok);root.appendChild(sr);
  }
}
function blankOut(text){
  return text.split(' ').map((w,i)=>((i*7+3)%5<2)?'<span class="blank" style="border-color:var(--accent)">'+esc(w)+'</span>':esc(w)).join(' ');
}

// ---------- PROGRESS ----------
function renderProgress(root){
  root.appendChild(el('div','section-title','전체 진도'));
  COLLS.forEach(c=>{
    const vs=V.filter(v=>v.coll===c.name);
    const done=vs.filter(v=>learned.has(v.id)).length;
    const pct=Math.round(done/vs.length*100);
    const g=el('div','progress-band');
    g.style.cursor='pointer';
    g.innerHTML=`<div class="pb-top"><b>${esc(c.short)}</b><span class="pct">${done}/${vs.length}</span></div>`+
      `<div class="bar"><i style="width:${pct}%"></i></div>`;
    g.onclick=()=>{curColl=c.name;LS.coll=c.name;tab='browse';render();};
    root.appendChild(g);
  });
  const total=V.length, done=V.filter(v=>learned.has(v.id)).length;
  root.appendChild(el('div','pinfo',`합계 ${done} / ${total} 구절`));
  const reset=el('button','btn ghost','진도 초기화');
  reset.style.cssText='max-width:200px;margin:22px auto 0;color:var(--bad)';
  reset.onclick=()=>{if(confirm('모든 진도를 지울까요?')){learned=new Set();LS.l=learned;render();}};
  root.appendChild(reset);
}

// ---------- collection picker ----------
$('#collBtn').onclick=()=>{
  const s=$('#sheet');
  s.innerHTML=`<div class="grip"></div><div class="sref" style="font-size:18px;margin-bottom:14px">암송 과정 선택</div>`;
  COLLS.forEach(c=>{
    const done=V.filter(v=>v.coll===c.name&&learned.has(v.id)).length;
    const b=el('button','coll-opt'+(c.name===curColl?' on':''),
      `<div><div class="cn">${esc(c.short)}</div><div class="cc">${esc(c.name)}</div></div>`+
      `<span class="cbadge">${done}/${c.count}</span>`);
    b.onclick=()=>{curColl=c.name;LS.coll=c.name;state.openGroups.clear();state.mzScope=null;TState.scope='__all';TState.mode=null;closeSheet();render();};
    s.appendChild(b);
  });
  const vers=D.versions||[{id:curVersion,name:'개역한글'}];
  // 번역(주 번역)
  const h1=el('div','sref','번역'); h1.style.cssText='font-size:14px;margin:22px 0 8px;color:var(--muted)'; s.appendChild(h1);
  vers.forEach(ver=>{
    const b=el('button','coll-opt'+(ver.id===curVersion?' on':''),
      `<div><div class="cn">${esc(ver.name)}</div>${ver.year?`<div class="cc">${ver.year}</div>`:''}</div>`+
      `${ver.id===curVersion?'<span class="cbadge">사용중</span>':''}`);
    b.onclick=()=>{ curVersion=ver.id; localStorage.bm_version=ver.id; if(curParallel===ver.id){curParallel='';localStorage.bm_parallel='';} refreshSheet(); render(); };
    s.appendChild(b);
  });
  // 대역(나란히 볼 번역)
  const h2=el('div','sref','대역 (아래 나란히)'); h2.style.cssText='font-size:14px;margin:20px 0 8px;color:var(--muted)'; s.appendChild(h2);
  const none=el('button','coll-opt'+(curParallel===''?' on':''),`<div><div class="cn">없음</div></div>${curParallel===''?'<span class="cbadge">사용중</span>':''}`);
  none.onclick=()=>{ curParallel=''; localStorage.bm_parallel=''; refreshSheet(); render(); };
  s.appendChild(none);
  vers.filter(ver=>ver.id!==curVersion).forEach(ver=>{
    const b=el('button','coll-opt'+(ver.id===curParallel?' on':''),
      `<div><div class="cn">${esc(ver.name)}</div>${ver.year?`<div class="cc">${ver.year}</div>`:''}</div>`+
      `${ver.id===curParallel?'<span class="cbadge">사용중</span>':''}`);
    b.onclick=()=>{ curParallel=ver.id; localStorage.bm_parallel=ver.id; refreshSheet(); render(); };
    s.appendChild(b);
  });
  $('#sheetBack').classList.add('show');
};
function refreshSheet(){ $('#collBtn').onclick(); }

// ---------- utils ----------
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ---------- tabs ----------
document.querySelectorAll('#tabs button').forEach(b=>{
  b.onclick=()=>{tab=b.dataset.tab; if(tab==='memorize')state.mzReveal=false; render();};
});

// keyboard: memorize navigation
document.addEventListener('keydown',e=>{
  if(tab!=='memorize'||$('#sheetBack').classList.contains('show'))return;
  if(e.key==='ArrowRight'){e.preventDefault();mzGo(1);}
  else if(e.key==='ArrowLeft'){e.preventDefault();mzGo(-1);}
  else if(e.key===' '||e.key==='ArrowUp'||e.key==='ArrowDown'){e.preventDefault();mzReveal();}
});

render();
if('serviceWorker' in navigator){
  let _swReloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{ if(_swReloaded)return; _swReloaded=true; location.reload(); });
  navigator.serviceWorker.register('sw.js').then(reg=>{ reg.update(); setInterval(()=>reg.update(),60000); }).catch(()=>{});
}
})();
</script>
